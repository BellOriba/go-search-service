<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Go Search Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans" x-data="adminPanel()">

    <nav class="bg-white shadow-sm border-b mb-8">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-gray-800">Go Search Store <span class="text-blue-500">Admin</span></a>
            <template x-if="loggedIn">
                <button @click="logout()" class="text-sm text-red-600 font-medium hover:underline">Sair</button>
            </template>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-4 pb-20">
        
        <template x-if="!loggedIn">
            <div class="bg-white p-8 rounded-2xl shadow-sm border">
                <h2 class="text-2xl font-bold mb-6 text-center">Login Administrativo</h2>
                <form @submit.prevent="login()">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
                            <input type="email" x-model="loginForm.email" required 
                                   class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
                            <input type="password" x-model="loginForm.password" required
                                   class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <button type="submit" :disabled="loading"
                                class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition disabled:opacity-50">
                            <span x-show="!loading">Entrar</span>
                            <span x-show="loading">Autenticando...</span>
                        </button>
                    </div>
                </form>
            </div>
        </template>

        <template x-if="loggedIn">
            <div class="space-y-6">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-bold">Novo Produto</h2>
                    <button @click="syncMeilisearch()" class="text-xs bg-gray-200 px-3 py-1 rounded-full font-bold hover:bg-gray-300">
                        Forçar Sync Manual
                    </button>
                </div>

                <form @submit.prevent="createProduct()" class="bg-white p-8 rounded-2xl shadow-sm border space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Nome do Produto</label>
                        <input type="text" x-model="product.name" placeholder="Ex: Monitor UltraWide" required
                               class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">SKU</label>
                            <input type="text" x-model="product.sku" placeholder="MON-001" required
                                   class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Preço (em centavos)</label>
                            <input type="number" x-model="product.price" placeholder="125000" required
                                   class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Slug</label>
                        <input type="text" x-model="product.slug" placeholder="monitor-ultrawide" required
                               class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">ID da Categoria (UUID)</label>
                        <input type="text" x-model="product.category_id" required
                               class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-xs">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Descrição</label>
                        <textarea x-model="product.description" rows="3"
                                  class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">URL da Imagem</label>
                        <input type="text" x-model="imageUrl" placeholder="https://unsplash.com/..."
                               class="w-full border p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                    </div>

                    <div class="flex items-center">
                        <input type="checkbox" x-model="product.is_featured" class="mr-2">
                        <span class="text-sm text-gray-700">Produto em Destaque</span>
                    </div>

                    <button type="submit" :disabled="loading"
                            class="w-full bg-green-600 text-white py-4 rounded-lg font-bold hover:bg-green-700 transition disabled:opacity-50">
                        <span x-show="!loading">Cadastrar Produto</span>
                        <span x-show="loading">Enviando...</span>
                    </button>
                </form>
            </div>
        </template>
    </main>

    <script>
        function adminPanel() {
            return {
                loggedIn: !!localStorage.getItem('admin_token'),
                loading: false,
                imageUrl: '',
                loginForm: { email: '', password: '' },
                product: {
                    name: '', sku: '', slug: '', price: 0, 
                    description: '', category_id: '', is_featured: false
                },

                async login() {
                    this.loading = true;
                    try {
                        const res = await fetch('/api/v1/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(this.loginForm)
                        });
                        
                        if (!res.ok) throw new Error('Credenciais inválidas');
                        
                        const data = await res.json();
                        localStorage.setItem('admin_token', data.token);
                        this.loggedIn = true;
                        alert('Login realizado com sucesso!');
                    } catch (err) {
                        alert(err.message);
                    } finally {
                        this.loading = false;
                    }
                },

                async createProduct() {
                    this.loading = true;
                    const token = localStorage.getItem('admin_token');

                    const payload = {
                        ...this.product,
                        price: parseInt(this.product.price),
                        images: this.imageUrl ? [{
                            path: '/uploads/' + this.product.slug + '.jpg',
                            original_url: this.imageUrl,
                            is_primary: true
                        }] : []
                    };

                    try {
                        const res = await fetch('/api/v1/products', {
                            method: 'POST',
                            headers: { 
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${token}`
                            },
                            body: JSON.stringify(payload)
                        });

                        if (!res.ok) {
                            if (res.status === 401) this.logout();
                            throw new Error('Erro ao criar produto');
                        }

                        alert('Produto criado e indexado!');
                        this.resetForm();
                    } catch (err) {
                        alert(err.message);
                    } finally {
                        this.loading = false;
                    }
                },

                async syncMeilisearch() {
                    const token = localStorage.getItem('admin_token');
                    const res = await fetch('/api/v1/products/sync', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) alert('Sincronização concluída!');
                },

                logout() {
                    localStorage.removeItem('admin_token');
                    this.loggedIn = false;
                    window.location.reload();
                },

                resetForm() {
                    this.product = { name: '', sku: '', slug: '', price: 0, description: '', category_id: '', is_featured: false };
                    this.imageUrl = '';
                }
            }
        }
    </script>
</body>
</html>
