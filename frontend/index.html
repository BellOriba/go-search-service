<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Search Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-8 font-sans">

    <div class="max-w-5xl mx-auto" 
         x-data="{ 
            search: '', 
            category: '', 
            sort: '', 
            products: [],
            loading: false,

            async fetchProducts() {
                this.loading = true;
                // Usamos a URL relativa para passar pelo proxy do Nginx (porta 80)
                let url = new URL('/api/v1/products/search', window.location.origin);
                
                if (this.search) url.searchParams.append('q', this.search);
                if (this.category) url.searchParams.append('category', this.category);
                
                if (this.sort) {
                    const [sortBy, order] = this.sort.split(':');
                    url.searchParams.append('sort_by', sortBy);
                    url.searchParams.append('order', order);
                }

                try {
                    const response = await fetch(url);
                    if (!response.ok) throw new Error('Erro na requisição');
                    this.products = await response.json();
                } catch (error) {
                    console.error('Erro ao buscar produtos:', error);
                    this.products = [];
                } finally {
                    this.loading = false;
                }
            }
         }" 
         x-init="fetchProducts()">

        <header class="mb-8">
            <h1 class="text-4xl font-extrabold text-gray-800 tracking-tight">Go Search Store</h1>
        </header>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-8 flex flex-col md:flex-row gap-4">
            <div class="flex-1 relative">
                <input type="text" 
                       x-model="search"
                       @input.debounce.300ms="fetchProducts()"
                       placeholder="Pesquise produtos..." 
                       class="w-full border border-gray-300 px-4 py-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                
                <div x-show="loading" class="absolute right-3 top-3">
                    <svg class="animate-spin h-5 w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </div>
            </div>

            <select x-model="category" @change="fetchProducts()" class="border border-gray-300 px-4 py-3 rounded-lg bg-white outline-none">
                <option value="">Todas as Categorias</option>
                <option value="Electronics">Eletrônicos</option>
            </select>

            <select x-model="sort" @change="fetchProducts()" class="border border-gray-300 px-4 py-3 rounded-lg bg-white outline-none">
                <option value="">Relevância</option>
                <option value="price:asc">Menor Preço</option>
                <option value="price:desc">Maior Preço</option>
                <option value="created_at:desc">Novidades</option>
            </select>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            <template x-for="p in products" :key="p.id">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-md transition-all flex flex-col">
                    
                    <div class="w-full h-48 bg-gray-200 relative">
                        <template x-if="p.image">
                            <img :src="p.image" :alt="p.name" class="w-full h-full object-cover">
                        </template>
                        <template x-if="!p.image">
                            <div class="w-full h-full flex items-center justify-center text-gray-400">
                                <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            </div>
                        </template>
                        
                        <template x-if="p.is_featured">
                            <span class="absolute top-2 right-2 bg-yellow-400 text-yellow-900 text-[10px] px-2 py-1 rounded-md font-bold uppercase shadow-sm">Destaque</span>
                        </template>
                    </div>

                    <div class="p-6 flex flex-col flex-grow">
                        <div class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-1" x-text="p.category"></div>
                        <h2 class="text-xl font-bold text-gray-800 mb-2 leading-tight" x-text="p.name"></h2>
                        <p class="text-gray-500 text-sm mb-4 line-clamp-2 flex-grow" x-text="p.description"></p>
                        
                        <div class="mt-auto pt-4 border-t border-gray-50">
                            <span class="text-2xl font-black text-gray-900" 
                                  x-text="new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(p.price / 100)">
                            </span>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <div x-show="products.length === 0 && !loading" class="text-center py-20 text-gray-500">
            Nenhum resultado encontrado para "<span class="font-semibold text-gray-800" x-text="search"></span>".
        </div>

    </div>
</body>
</html>
